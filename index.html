<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .photo {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e94560;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 3em;
            color: #e94560;
            text-transform: uppercase;
            letter-spacing: 10px;
        }
        .dots span {
            animation: blink 1.5s infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.3s; }
        .dots span:nth-child(3) { animation-delay: 0.6s; }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="profile.jpg" alt="Profile" class="photo">
        <h1>Coming Soon<span class="dots"><span>.</span><span>.</span><span>.</span></span></h1>
    </div>
</body>
</html>
